<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>重構跨越臺海的現代史</title>
    <meta
      name="description"
      content="二十世紀中國歷史協會與中央研究院近代史研究所聯合主辦國際學術研討會：重構跨越臺海的現代史。"
    />
    <meta property="og:title" content="重構跨越臺海的現代史" />
    <meta property="og:description" content="二十世紀中國歷史協會與中央研究院近代史研究所聯合主辦國際學術研討會：重構跨越臺海的現代史。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主要內容</a>

    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#/zh/home" aria-label="回首頁">
          <img class="brand-symbol" src="assets/images/site-symbol-green.png" alt="" />
          <span>
            <strong data-bind="site.shortTitle">CONF 2027</strong>
            <small data-bind="site.host">主辦單位名稱</small>
          </span>
        </a>

        <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="主選單"></nav>
      </div>
    </header>

    <main id="main" tabindex="-1"></main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>
          <strong data-bind="site.title">大型會議名稱</strong>
          <p data-bind="site.footerText">可放主辦單位、版權與聯絡資訊。</p>
        </div>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <aside class="editor" id="editor" hidden>
      <div class="editor-panel">
        <div class="editor-heading">
          <h2>內容編輯</h2>
          <button type="button" id="close-editor">關閉</button>
        </div>
        <p>
          修改後會先存在這臺電腦的瀏覽器。要正式發布，請按「匯出資料」並替換
          <code>content/site-data.js</code>。
        </p>
        <label>
          網站標題
          <input id="edit-title" type="text" />
        </label>
        <label>
          主視覺圖片 URL 或路徑
          <input id="edit-hero" type="text" />
        </label>
        <label>
          報名表 URL
          <input id="edit-registration-url" type="url" placeholder="https://forms.gle/..." />
        </label>
        <label>
          首頁主標
          <input id="edit-home-title" type="text" />
        </label>
        <label>
          首頁簡介
          <textarea id="edit-home-body" rows="6"></textarea>
        </label>
        <div class="editor-section">
          <h3>重要資訊四區塊內文</h3>
          <p>每個段落請用空白行分隔；此處會同步更新中英文版頁面資料。</p>
          <div id="edit-info-blocks"></div>
        </div>
        <div class="editor-actions">
          <button type="button" id="save-editor">套用修改</button>
          <button type="button" id="export-editor">匯出資料</button>
        </div>
        <textarea id="export-output" rows="10" readonly placeholder="匯出內容會出現在這裡"></textarea>
      </div>
    </aside>

    <script src="content/site-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
